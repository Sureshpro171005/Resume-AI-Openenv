name: resume-ai-openenv

description: >
  An AI environment where an agent improves resumes step-by-step
  to better match job descriptions using reward-based feedback.

version: 1.0

actions:
  - add_skills
  - improve_experience
  - optimize_keywords
  - rewrite_summary

observation_space:
  - resume
  - job_description
  - current_score

reward:
  type: continuous
  range: [0, 1]
  description: change in similarity score between resume and job description

tasks:
  - name: easy
    description: basic skill matching
  - name: medium
    description: skills and experience optimization
  - name: hard
    description: full resume optimization for complex roles

environment:
  entry_point: env.resume_env:ResumeEnv


server:
  type: http
  base_path: /
  endpoints:
    reset: /reset
    step: /step